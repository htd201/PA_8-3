<!DOCTYPE html>
<html lang="vi"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc mừng 8/3 - Phương Anh</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@300;500&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-main: #ff85a1;
            --pink-dark: #e0115f;
            --gold: #d4af37;
            --white-cream: #fffafb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            background: #fff0f3;
            font-family: 'Quicksand', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Background với họa tiết chìm */
            background-color: #fff0f3;
            background-image: 
                radial-gradient(#ffcad4 1px, transparent 1px),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 10c-5-5-15-2-15 8 0 8 15 17 15 17s15-9 15-17c0-10-10-13-15-8z' fill='%23ff85a1' fill-opacity='0.05'/%3E%3C/svg%3E");
            background-size: 30px 30px, 120px 120px;
        }

        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Ảnh Polaroid trang trí xung quanh - Đã tăng kích thước */
        .photo-decor {
            position: fixed;
            width: 260px; /* Tăng từ 200px lên 260px */
            height: 320px; /* Tăng từ 250px lên 320px */
            background: white;
            padding: 12px 12px 50px 12px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.15), 0 0 20px rgba(255, 133, 161, 0.2);
            z-index: 2;
            border-radius: 8px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: float-photo 8s ease-in-out infinite;
        }

        @keyframes float-photo {
            0%, 100% { transform: translateY(0) rotate(var(--rot)); }
            50% { transform: translateY(-25px) rotate(calc(var(--rot) + 3deg)); }
        }

        .photo-decor img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4px;
        }

        .photo-decor::after {
            content: "♥ Memory with Love ♥";
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--pink-dark);
            font-family: 'Dancing Script', cursive;
            font-size: 1.1rem;
            width: 100%;
            text-align: center;
        }

        /* Vị trí các ảnh phụ - Điều chỉnh để không đè lên thiệp chính */
        .p1 { top: 8%; left: 3%; --rot: -10deg; animation-delay: 0s; }
        .p2 { bottom: 8%; left: 4%; --rot: 12deg; animation-delay: 1s; }
        .p3 { top: 10%; right: 3%; --rot: 8deg; animation-delay: 2s; }
        .p4 { bottom: 10%; right: 4%; --rot: -15deg; animation-delay: 1.5s; }

        .photo-decor:hover {
            transform: scale(1.15) rotate(0deg) !important;
            z-index: 100;
            box-shadow: 0 30px 60px rgba(224, 17, 95, 0.4);
            cursor: zoom-in;
        }

        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
        }

        /* Tiêu đề lấp lánh */
        .title {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.5rem, 10vw, 3.8rem);
            color: var(--pink-dark);
            text-shadow: 2px 4px 15px rgba(224, 17, 95, 0.3);
            margin-bottom: 25px;
            text-align: center;
        }

        /* Thiệp Luxury */
        .card-wrapper {
            perspective: 2000px;
            width: 380px;
            height: 520px;
            cursor: pointer;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 30px 80px rgba(0,0,0,0.15);
        }

        .card.open { transform: rotateY(-180deg); }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            background: white;
            border: 10px solid white;
            box-shadow: inset 0 0 20px rgba(255, 133, 161, 0.15);
        }

        /* Mặt trước */
        .card-front {
            z-index: 2;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
        }

        .flower-corner {
            position: absolute;
            width: 140px;
            height: 140px;
            z-index: 3;
            pointer-events: none;
            opacity: 0.95;
        }
        .top-left { top: -15px; left: -15px; transform: rotate(0deg); }
        .bottom-right { bottom: -15px; right: -15px; transform: rotate(180deg); }

        .photo-box {
            flex: 1;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            border: 1px solid #f0f0f0;
        }
        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-front h2 {
            font-family: 'Dancing Script', cursive;
            color: var(--pink-dark);
            text-align: center;
            padding: 18px 0 8px;
            font-size: 1.8rem;
        }

        /* Mặt sau */
        .card-back {
            transform: rotateY(180deg);
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fff 0%, #fff5f7 100%);
        }

        .card-back::before {
            content: '';
            position: absolute;
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 2px double rgba(224, 17, 95, 0.15);
            border-radius: 15px;
            pointer-events: none;
        }

        .letter-content {
            font-family: 'Dancing Script', cursive;
            font-size: 1.7rem;
            line-height: 1.6;
            color: #333;
            text-align: center;
        }

        .letter-content b { color: var(--pink-dark); font-size: 2rem; }

        /* Nút bấm */
        .btn-celebrate {
            margin-top: 35px;
            padding: 18px 50px;
            border: none;
            background: linear-gradient(45deg, #ff85a1, #e0115f);
            color: white;
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 12px 30px rgba(224, 17, 95, 0.4);
            transition: all 0.3s;
        }

        .btn-celebrate:hover {
            transform: scale(1.08) translateY(-5px);
            box-shadow: 0 18px 40px rgba(224, 17, 95, 0.6);
        }

        /* Music Player */
        .music-player {
            position: fixed;
            bottom: 35px;
            right: 35px;
            width: 75px;
            height: 75px;
            background: white;
            border-radius: 50%;
            padding: 6px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.15);
            cursor: pointer;
            z-index: 100;
            border: 3px solid var(--pink-main);
        }
        .music-player img {
            width: 100%; height: 100%;
            border-radius: 50%;
            animation: spin 6s linear infinite;
            animation-play-state: paused;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        @media (max-width: 1400px) {
            .photo-decor { width: 200px; height: 260px; }
        }

        @media (max-width: 1000px) {
            .photo-decor { width: 160px; height: 210px; }
            .p1 { top: 5%; } .p3 { top: 5%; }
        }

        @media (max-width: 768px) {
            .photo-decor { display: none; }
            .card-wrapper { width: 330px; height: 480px; }
            .letter-content { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <!-- Các thẻ ảnh trang trí xung quanh - Đã tăng kích thước -->
    <div class="photo-decor p1"><img src="z7598811677354_bf99361b239e97686b5fba17962c06ef.jpg"></div>
    <div class="photo-decor p2"><img src="z7598813991521_31fba6b7681c8919a615ee65c2ec61fb.jpg"></div>
    <div class="photo-decor p3"><img src="z7598815435860_f227f16b0b9d3a854b390f18b028d5f1.jpg"></div>
    <div class="photo-decor p4"><img src="z7598821328692_dda08e70c53e57fafd5a29eef3b8f7c0.jpg"></div>

    <div class="container">
        <h1 class="title">For My Special One ✨</h1>

        <div class="card-wrapper" onclick="openCard()">
            <div class="card" id="card">
                <div class="card-front">
                    <!-- Decor Flowers SVG -->
                    <svg class="flower-corner top-left" viewBox="0 0 100 100">
                        <circle cx="30" cy="30" r="25" fill="#ffcad4" opacity="0.6"/>
                        <circle cx="50" cy="20" r="15" fill="#ff85a1" opacity="0.5"/>
                        <path d="M10 10 Q 50 10 50 50" stroke="#e0115f" stroke-width="2" fill="none" opacity="0.3"/>
                    </svg>
                    <svg class="flower-corner bottom-right" viewBox="0 0 100 100">
                        <circle cx="30" cy="30" r="25" fill="#ffcad4" opacity="0.6"/>
                        <circle cx="50" cy="20" r="15" fill="#ff85a1" opacity="0.5"/>
                    </svg>

                    <div class="photo-box">
                        <img src="z7598798369369_372c8887db29e9e33a1b742ecca0c4ba.jpg" alt="Phương Anh">
                    </div>
                    <h2>Gửi đến Phương Anh... ❤️</h2>
                </div>

                <div class="card-back">
                    <div class="letter-content">
                        ✨ <b>Phương Anh</b> ✨<br><br>
                        Nhân ngày 8/3 ngọt ngào,<br>
                        chúc cho bông hoa đẹp nhất<br>
                        luôn nở nụ cười trên môi.<br><br>
                        Mong em mãi hạnh phúc,<br>
                        tự tin và luôn là chính mình.<br>
                        Thế giới đẹp hơn nhờ có em!<br><br>
                        ❤️ <i>Yêu em rất nhiều</i> ❤️
                    </div>
                </div>
            </div>
        </div>

        <button class="btn-celebrate" onclick="burstHearts(event)">Bấm vào đây nè ❤️</button>
    </div>

    <div class="music-player" onclick="toggleMusic()">
        <img src="z7598798369369_372c8887db29e9e33a1b742ecca0c4ba.jpg" id="disc">
    </div>

    <video id="audio" loop style="display:none">
        <source src="7598877898002.mp4" type="video/mp4">
    </video>

    <script>
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        const audio = document.getElementById('audio');
        const disc = document.getElementById('disc');
        let hearts = [];
        let sparkles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Sparkle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3;
                this.alpha = Math.random();
                this.speed = Math.random() * 0.01 + 0.005;
            }
            update() {
                this.alpha += this.speed;
                if (this.alpha > 1 || this.alpha < 0) this.speed *= -1;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.shadowBlur = 5;
                ctx.shadowColor = "white";
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class Heart {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 30 + 20;
                const angle = (Math.random() * Math.PI * 2);
                const force = Math.random() * 12 + 8;
                this.vx = Math.cos(angle) * force;
                this.vy = Math.sin(angle) * force - 6;
                this.alpha = 1;
                this.rotation = Math.random() * Math.PI * 2;
                this.spin = (Math.random() - 0.5) * 0.15;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.25; 
                this.vx *= 0.99;
                this.alpha -= 0.008;
                this.rotation += this.spin;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.font = `${this.size}px serif`;
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#ff85a1";
                ctx.fillText("❤️", -this.size/2, this.size/2);
                ctx.restore();
            }
        }

        for(let i=0; i<120; i++) sparkles.push(new Sparkle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            sparkles.forEach(s => { s.update(); s.draw(); });
            
            hearts.forEach((h, i) => {
                h.update();
                h.draw();
                if (h.alpha <= 0) hearts.splice(i, 1);
            });
            
            requestAnimationFrame(animate);
        }

        function openCard() {
            document.getElementById('card').classList.toggle('open');
            if (audio.paused) toggleMusic();
        }

        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                disc.style.animationPlayState = "running";
            } else {
                audio.pause();
                disc.style.animationPlayState = "paused";
            }
        }

        function burstHearts(e) {
            if (audio.paused) toggleMusic();
            const rect = e.target.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            for (let i = 0; i < 150; i++) {
                setTimeout(() => {
                    hearts.push(new Heart(centerX, centerY));
                }, i * 3);
            }
        }

        animate();
    </script>
</body>
</html>
